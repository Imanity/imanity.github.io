name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homepage
        uses: actions/checkout@v4
        with:
          path: imanity.github.io

      - name: Checkout gallery library
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/tabi-gallery
          ref: main
          token: ${{ secrets.TABI_GALLERY_TOKEN || github.token }}
          path: tabi-gallery

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install gallery dependencies
        working-directory: tabi-gallery
        run: npm install

      - name: Install homepage dependencies
        working-directory: imanity.github.io
        run: npm install

      - name: Build homepage
        working-directory: imanity.github.io
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: imanity.github.io/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
